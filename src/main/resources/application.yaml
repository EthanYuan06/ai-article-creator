spring:
  application:
    name: ai-article-creator
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  # MySQL 配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_article_creator
    username: root
    password: 1234
  # Redis 配置
  session:
    store-type: redis
    time-out: 2592000
  data:
    redis:
      database: 0
      host: localhost
      port: 6379
server:
  port: 8567
  servlet:
    # 访问路径前缀
    context-path: /api
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi 配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yuluo.app.controller
# knife4j 接口文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn
mybatis-flex:
  configuration:
    map-underscore-to-camel-case: false

